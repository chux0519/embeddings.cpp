<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>embeddings.cpp wasm bench</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>embeddings.cpp wasm bench</h1>
  <div id="status">starting</div>
  <pre id="log"></pre>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const buildDir = params.get("build") || "build-wasm-web";
      const backend = params.get("backend") || "";
      const batchPath = params.get("batch") || "/snowflake_wasm_batch.txt";
      const warmup = params.get("warmup") || "1";
      const iterations = params.get("iterations") || "2";
      const threads = params.get("threads");
      const modelPath = params.get("model_path") || "/models/snowflake-arctic-embed-m-v2.0.q4_k_mlp_q8_attn.gguf";
      const modelUrl = params.get("model_url") || "";
      const batchUrl = params.get("batch_url") || "";
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const fileCacheName = "embeddings-browser-files-v1";
      let jsonBuffer = [];
      let collecting = false;

      function append(line) {
        log.textContent += line + "\n";
      }

      function fileCacheKey(kind, url) {
        return `/__cache__/${kind}/${encodeURIComponent(url)}`;
      }

      function tryFinish(line) {
        const trimmed = String(line).trim();
        if (trimmed === "{") {
          collecting = true;
          jsonBuffer = ["{"];
          return;
        }
        if (collecting) {
          jsonBuffer.push(String(line));
          if (trimmed === "}") {
            collecting = false;
            const text = jsonBuffer.join("\n");
            try {
              window.__benchResult = JSON.parse(text);
              status.textContent = "done";
              if (window.parent && window.parent !== window) {
                window.parent.postMessage(
                  { type: "bench-result", result: window.__benchResult, error: null },
                  "*"
                );
              }
            } catch (err) {
              window.__benchError = "failed to parse result: " + err.message;
              status.textContent = "parse-error";
              if (window.parent && window.parent !== window) {
                window.parent.postMessage(
                  { type: "bench-result", result: null, error: window.__benchError },
                  "*"
                );
              }
            }
          }
        }
      }

      async function fetchCachedBytes(url, cacheKey) {
        const cache = await caches.open(fileCacheName);
        const cached = await cache.match(cacheKey);
        if (cached) {
          append(`[cache-hit] ${cacheKey}`);
          return new Uint8Array(await cached.arrayBuffer());
        }

        append(`[fetch] ${url}`);
        const response = await fetch(url, { cache: "reload" });
        if (!response.ok) {
          throw new Error(`failed to fetch ${url}: ${response.status}`);
        }
        await cache.put(cacheKey, response.clone());
        return new Uint8Array(await response.arrayBuffer());
      }

      function ensureDir(path) {
        const parts = path.split("/").filter(Boolean);
        let current = "";
        for (const part of parts) {
          current += "/" + part;
          try {
            FS.mkdir(current);
          } catch (err) {
            if (!String(err).includes("File exists")) {
              throw err;
            }
          }
        }
      }

      async function prepareDynamicFiles() {
        const files = [];
        if (modelUrl) {
          files.push({
            url: modelUrl,
            cacheKey: fileCacheKey("model", modelUrl),
            path: modelPath,
          });
        }
        if (batchUrl) {
          files.push({
            url: batchUrl,
            cacheKey: fileCacheKey("batch", batchUrl),
            path: batchPath,
          });
        }
        if (!files.length) {
          return [];
        }

        const prepared = [];
        for (const file of files) {
          const bytes = await fetchCachedBytes(file.url, file.cacheKey);
          prepared.push({ path: file.path, bytes });
        }
        return prepared;
      }

      const preparedFiles = await prepareDynamicFiles();

      window.Module = {
        arguments: [
          "--model", modelPath,
          "--batch", batchPath,
          "--warmup", warmup,
          "--iterations", iterations
        ],
        preRun: [function () {
          for (const file of preparedFiles) {
            const slash = file.path.lastIndexOf("/");
            if (slash > 0) {
              ensureDir(file.path.slice(0, slash));
            }
            FS.writeFile(file.path, file.bytes);
          }
        }],
        locateFile: function (path) {
          return "/" + buildDir + "/" + path;
        },
        print: function (text) {
          append(text);
          tryFinish(text);
        },
        printErr: function (text) {
          append("[stderr] " + text);
        },
        setStatus: function (text) {
          status.textContent = text;
        },
        onAbort: function (reason) {
          window.__benchError = String(reason);
          status.textContent = "abort";
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(
              { type: "bench-result", result: null, error: window.__benchError },
              "*"
            );
          }
        }
      };
      if (threads) {
        window.Module.arguments.push("--threads", threads);
      }
      if (backend) {
        window.Module.arguments.push("--backend", backend);
      }

      const script = document.createElement("script");
      script.src = "/" + buildDir + "/embedding_wasm_model_bench.js";
      script.onerror = function () {
        window.__benchError = "failed to load bench script";
        status.textContent = "load-error";
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            { type: "bench-result", result: null, error: window.__benchError },
            "*"
          );
        }
      };
      document.body.appendChild(script);
    })().catch((err) => {
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const message = String(err && err.message ? err.message : err);
      status.textContent = "prepare-error";
      log.textContent += `[prepare-error] ${message}\n`;
      window.__benchError = message;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { type: "bench-result", result: null, error: message },
          "*"
        );
      }
    });
  </script>
</body>
</html>
