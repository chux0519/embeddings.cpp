<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>embeddings.cpp wasm encode</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>embeddings.cpp wasm encode</h1>
  <div id="status">waiting</div>
  <pre id="log"></pre>
  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const buildDir = params.get("build") || "build-wasm-web-dyn";
      const backend = params.get("backend") || "";
      const threads = params.get("threads");
      const pooling = params.get("pooling") || "cls";
      const normalize = params.get("normalize") !== "0";
      const modelPath = params.get("model_path") || "/models/snowflake-arctic-embed-m-v2.0.q4_k_mlp_q8_attn.gguf";
      const modelUrl = params.get("model_url") || "";
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const fileCacheName = "embeddings-browser-files-v1";
      const modelDbName = "embeddings-browser-models-v1";
      const modelStoreName = "files";
      let jsonBuffer = [];
      let collecting = false;
      let requestResolver = null;
      let requestResolved = false;

      function postStatus(stage, detail) {
        window.parent.postMessage({ type: "encode-status", stage, detail, atMs: performance.now() }, "*");
      }

      function append(line) {
        log.textContent += line + "\n";
      }

      function postWaitingRequest(detail = "") {
        status.textContent = "waiting-request";
        postStatus("waiting-request", detail);
      }

      window.addEventListener("error", (event) => {
        append(`[window-error] ${event.message || event.error || "unknown"}`);
        if (event.error && event.error.stack) {
          append(String(event.error.stack));
        }
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason;
        if (reason && typeof reason === "object") {
          append(`[unhandledrejection] ${JSON.stringify({
            name: reason.name,
            message: reason.message,
            code: reason.code,
            errno: reason.errno,
            stack: reason.stack,
          })}`);
        } else {
          append(`[unhandledrejection] ${reason || "unknown"}`);
        }
      });

      function fileCacheKey(kind, url) {
        return `/__cache__/${kind}/${encodeURIComponent(url)}`;
      }

      function openModelDb() {
        if (typeof indexedDB === "undefined") {
          return Promise.resolve(null);
        }
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(modelDbName, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(modelStoreName)) {
              db.createObjectStore(modelStoreName);
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error("failed to open model db"));
        });
      }

      async function readModelCache(url) {
        const db = await openModelDb();
        if (!db) {
          return null;
        }
        try {
          return await new Promise((resolve, reject) => {
            const tx = db.transaction(modelStoreName, "readonly");
            const req = tx.objectStore(modelStoreName).get(url);
            req.onsuccess = () => {
              const value = req.result;
              if (value instanceof ArrayBuffer) {
                resolve(new Uint8Array(value));
                return;
              }
              if (value && value.buffer instanceof ArrayBuffer) {
                resolve(new Uint8Array(value.buffer));
                return;
              }
              resolve(null);
            };
            req.onerror = () => reject(req.error || new Error("failed to read model cache"));
          });
        } finally {
          db.close();
        }
      }

      async function writeModelCache(url, bytes) {
        const db = await openModelDb();
        if (!db) {
          return;
        }
        try {
          await new Promise((resolve, reject) => {
            const tx = db.transaction(modelStoreName, "readwrite");
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error || new Error("failed to write model cache"));
            tx.objectStore(modelStoreName).put(bytes.buffer.slice(0), url);
          });
        } finally {
          db.close();
        }
      }

      async function fetchCachedBytes(url, cacheKey) {
        if (cacheKey && cacheKey.includes("/model/")) {
          const modelBytes = await readModelCache(url);
          if (modelBytes) {
            append(`[model-idb-hit] ${url}`);
            postStatus("model-idb-hit", `${url} ${(modelBytes.byteLength / (1024 * 1024)).toFixed(2)} MiB`);
            return modelBytes;
          }
          postStatus("model-idb-miss", url);
        }

        const cacheApi = typeof caches !== "undefined" ? caches : null;
        const cache = cacheApi ? await cacheApi.open(fileCacheName) : null;
        if (cache) {
          const cached = await cache.match(cacheKey);
          if (cached) {
            append(`[cache-hit] ${cacheKey}`);
            postStatus("cache-hit", cacheKey);
            return new Uint8Array(await cached.arrayBuffer());
          }
        } else {
          postStatus("cache-unavailable", url);
        }

        append(`[fetch] ${url}`);
        postStatus("fetch-start", url);
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`failed to fetch ${url}: ${response.status}`);
        }
        const totalHeader = response.headers.get("content-length");
        const total = totalHeader ? parseInt(totalHeader, 10) : null;
        if (response.body) {
          const reader = response.body.getReader();
          const chunks = [];
          let loaded = 0;
          while (true) {
            const { value, done } = await reader.read();
            if (done) {
              break;
            }
            if (!value) {
              continue;
            }
            chunks.push(value);
            loaded += value.byteLength;
            const loadedMiB = (loaded / (1024 * 1024)).toFixed(2);
            const totalMiB = total ? (total / (1024 * 1024)).toFixed(2) : null;
            const percent = total ? ((loaded / total) * 100).toFixed(1) : null;
            postStatus(
              "fetch-progress",
              `${url} ${loadedMiB} MiB${totalMiB ? ` / ${totalMiB} MiB` : ""}${percent ? ` (${percent}%)` : ""}`,
            );
          }
          const bytes = new Uint8Array(loaded);
          let offset = 0;
          for (const chunk of chunks) {
            bytes.set(chunk, offset);
            offset += chunk.byteLength;
          }
          if (cache) {
            await cache.put(cacheKey, new Response(bytes, { headers: { "Content-Type": response.headers.get("content-type") || "application/octet-stream" } }));
          }
          if (cacheKey && cacheKey.includes("/model/")) {
            await writeModelCache(url, bytes);
            postStatus("model-idb-ready", `${url} ${(bytes.byteLength / (1024 * 1024)).toFixed(2)} MiB`);
          }
          postStatus("fetch-ready", url);
          return bytes;
        }
        if (cache) {
          await cache.put(cacheKey, response.clone());
        }
        const bytes = new Uint8Array(await response.arrayBuffer());
        if (cacheKey && cacheKey.includes("/model/")) {
          await writeModelCache(url, bytes);
          postStatus("model-idb-ready", `${url} ${(bytes.byteLength / (1024 * 1024)).toFixed(2)} MiB`);
        }
        postStatus("fetch-ready", url);
        return bytes;
      }

      function ensureDir(path) {
        const parts = path.split("/").filter(Boolean);
        let current = "";
        for (const part of parts) {
          current += "/" + part;
          try {
            FS.mkdir(current);
          } catch (err) {
            if (!String(err).includes("File exists")) {
              throw err;
            }
          }
        }
      }

      function tryFinish(line) {
        const trimmed = String(line).trim();
        if (trimmed === "{") {
          collecting = true;
          jsonBuffer = ["{"];
          return;
        }
        if (collecting) {
          jsonBuffer.push(String(line));
          if (trimmed === "}") {
            collecting = false;
            const text = jsonBuffer.join("\n");
            try {
              const result = JSON.parse(text);
              status.textContent = "done";
              postStatus("encode-result-ready");
              window.parent.postMessage({ type: "encode-result", result, error: null }, "*");
            } catch (err) {
              const error = "failed to parse result: " + err.message;
              status.textContent = "parse-error";
              window.parent.postMessage({ type: "encode-result", result: null, error }, "*");
            }
          }
        }
      }

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "runner-ping") {
          if (!requestResolved) {
            postWaitingRequest("pong");
          }
          return;
        }
        if (data.type === "encode-request" && requestResolver && !requestResolved) {
          requestResolved = true;
          postStatus("encode-request-received");
          requestResolver(data);
        }
      });

      const request = await new Promise((resolve) => {
        requestResolver = resolve;
        postWaitingRequest("initial");
      });

      const files = [];
      if (modelUrl) {
        files.push({
          url: modelUrl,
          cacheKey: fileCacheKey("model", modelUrl),
          path: modelPath,
        });
      }
      const batchPath = "/input_batch.txt";
      const batchBytes = new TextEncoder().encode(request.batchLine + "\n");

      const preparedFiles = [];
      for (const file of files) {
        postStatus("file-prepare", file.path);
        const bytes = await fetchCachedBytes(file.url, file.cacheKey);
        preparedFiles.push({ path: file.path, bytes });
      }
      preparedFiles.push({ path: batchPath, bytes: batchBytes });

      window.Module = {
        arguments: [
          "--model", modelPath,
          "--batch", batchPath,
          "--pooling", pooling,
        ],
        preRun: [function () {
          postStatus("pre-run");
          for (const file of preparedFiles) {
            const slash = file.path.lastIndexOf("/");
            if (slash > 0) {
              ensureDir(file.path.slice(0, slash));
            }
            FS.writeFile(file.path, file.bytes);
            const analyzed = FS.analyzePath(file.path);
            append(`[preRun] ${file.path} exists=${analyzed.exists} object=${analyzed.object ? analyzed.object.mode : "null"}`);
            postStatus("file-ready", file.path);
          }
        }],
        locateFile: function (path) {
          return "/" + buildDir + "/" + path;
        },
        print: function (text) {
          append(text);
          tryFinish(text);
        },
        printErr: function (text) {
          append("[stderr] " + text);
        },
        setStatus: function (text) {
          status.textContent = text;
          postStatus("module-status", text);
        },
        onAbort: function (reason) {
          const error = String(reason);
          status.textContent = "abort";
          postStatus("abort", error);
          window.parent.postMessage({ type: "encode-result", result: null, error }, "*");
        }
      };
      if (threads) {
        window.Module.arguments.push("--threads", threads);
      }
      if (backend) {
        window.Module.arguments.push("--backend", backend);
      }
      if (!normalize) {
        window.Module.arguments.push("--no-normalize");
      }

      const script = document.createElement("script");
      script.src = "/" + buildDir + "/embedding_wasm_model_encode.js";
      postStatus("runtime-script-loading", script.src);
      script.onload = function () {
        postStatus("runtime-script-ready", script.src);
      };
      script.onerror = function () {
        const error = "failed to load encode script";
        status.textContent = "load-error";
        postStatus("load-error", error);
        window.parent.postMessage({ type: "encode-result", result: null, error }, "*");
      };
      document.body.appendChild(script);
    })().catch((err) => {
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const message = String(err && err.message ? err.message : err);
      status.textContent = "prepare-error";
      log.textContent += `[prepare-error] ${message}\n`;
      window.parent.postMessage({ type: "encode-status", stage: "prepare-error", detail: message, atMs: performance.now() }, "*");
      window.parent.postMessage({ type: "encode-result", result: null, error: message }, "*");
    });
  </script>
</body>
</html>
