name: Publish Python Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version consistency
        run: python scripts/check_version.py

      - name: Build sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build --sdist
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            archs: x86_64
          - name: linux-riscv64
            os: ubuntu-24.04
            archs: riscv64
          - name: macos-arm64
            os: macos-14
            archs: arm64
          - name: windows-x86_64
            os: windows-2022
            archs: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU for riscv64
        if: matrix.archs == 'riscv64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version consistency
        run: python scripts/check_version.py

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  publish:
    runs-on: ubuntu-24.04
    needs:
      - sdist
      - wheels
    environment:
      name: pypi
      url: https://pypi.org/project/embeddings-cpp/
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
